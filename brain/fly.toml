# Fly.io config for the ModelPilot BRAIN (routing decision + entitlement).
# The brain imports the modelpilot/ package, so it MUST build with the repo root
# as the Docker context. Because this config lives in a subdirectory, you MUST
# pass --dockerfile so Fly uses the repo root (your cwd) as the build context.
# Deploy from the repo root with EXACTLY:
#   fly deploy -c brain/fly.toml --dockerfile brain/Dockerfile
# (No [build] section here on purpose — a config-relative dockerfile path would
# resolve to brain/brain/Dockerfile and fail; the flag avoids that.)
#
# Full setup steps: brain/FLY_DEPLOY.md
# No secrets required: licenses verify with the bundled PUBLIC key, and with
# CONSOLE_URL set the brain reads entitlement from the console keylessly.
#
# app name must be globally unique. If `fly apps create` says it's taken, pick
# another and update: this `app` line, console MODELPILOT_BRAIN_URL, and the docs.

app = "modelpilot-brain-prod"
primary_region = "iad"

[env]
  PORT = "8600"
  BRAIN_DB = "/data/brain.db"
  CONSOLE_URL = "https://modelpilot-console-prod.fly.dev"

[http_service]
  internal_port = 8600
  force_https = true
  # Scale to zero to cut cost (cold start on first request after idle). The
  # gateway fails open if the brain is briefly waking, so traffic is never blocked
  # — that one request just passes through unrouted. Set min back to 1 for always-on.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[mounts]]
  source = "braindata"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

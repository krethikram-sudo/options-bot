# Fly.io config for the Outlay CONSOLE (vendor-internal control plane).
# Stateful: SQLite lives on a persistent volume at /data, so we run exactly ONE
# always-on machine (SQLite is single-writer — do NOT scale this to >1 machine).
#
# First-time setup + deploy steps are in console/FLY_DEPLOY.md.
#
# Custom domain: the product is served at https://app.outlay-ai.com (added with
# `fly certs add app.outlay-ai.com`). The <app>.fly.dev route still works as a
# fallback but isn't used. `app` is the Fly app name (globally unique); it's never
# shown to users once the custom domain is live.

app = "modelpilot-console-prod"
primary_region = "iad"

[build]
  dockerfile = "console/Dockerfile"

[env]
  CONSOLE_PORT = "8700"
  CONSOLE_BASE_URL = "https://app.outlay-ai.com"
  CONSOLE_SECURE_COOKIES = "1"
  # In-process schedulers — this is a single always-on machine, so it self-drives
  # every background sweep (no external cron). Both are idempotent + cadence-guarded;
  # only genuinely-due work fires. Verify freshness anytime at /admin/health.
  #   OUTLAY_AUTOSYNC_EVERY_MIN     auto-sync connected sources + staleness/failure alerts
  #   OUTLAY_MAINTENANCE_EVERY_MIN  weekly digest, monthly close pack, webhook redelivery, retention purge
  OUTLAY_AUTOSYNC_EVERY_MIN = "60"
  OUTLAY_MAINTENANCE_EVERY_MIN = "60"

# Secrets (NEVER put these in this file — set with `fly secrets set ...`):
#   CONSOLE_SECRET           required — signs session cookies; set once, keep stable
#   STRIPE_SECRET_KEY        optional — live billing
#   STRIPE_PRICE_ID          optional — the metered $0.20/savings price
#   STRIPE_WEBHOOK_SECRET    optional — /api/stripe/webhook
#   ADMIN_EMAIL/ADMIN_PASSWORD  temporary — only to seed the admin, then unset ADMIN_PASSWORD

[http_service]
  internal_port = 8700
  force_https = true
  # Always-on: keep one machine warm so the console has no cold-start lag on a
  # click (worth it for the signed-in UX). This costs ~a small always-on
  # shared-cpu-1x/512mb fee + the volume, instead of ~$0 when idle. To go back to
  # scale-to-zero for cost, set auto_stop_machines = "stop" and min_machines_running = 0.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[mounts]]
  source = "consoledata"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

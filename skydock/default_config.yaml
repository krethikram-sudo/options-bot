# Skydock v0 simulation parameters.
# Section references map to MVP spec v0.1.

simulation:
  duration_hours: 11.0       # spec 1.5: 7am-5:30pm operating day
  dt_seconds: 1.0
  seed: 42
  start_hour: 7.0            # sim t=0 corresponds to this wall-clock hour
  emit_packages_to:          # set to a directory to write per-scenario deliverables (spec 3.2)

world:
  width_m: 5000
  height_m: 5000
  daylight_start_hour: 7.0    # spec 1.2 civil daylight
  daylight_end_hour: 18.5

host_vehicles:
  count: 1
  speed_mph_cruise: 25
  stop_at_waypoint_seconds: 90     # how long the vehicle parks at a trigger waypoint
  # Per-vehicle corridor types — cycles if shorter than count.
  # Options: urban_dense (1.4x rate), suburban (1.0x), highway_mix (0.65x).
  corridor_types:
    - urban_dense

trigger:
  # Spec §1.3 — two independent sources.
  # Poisson source = manual + hard_brake (continuous operator-driven).
  poisson_rate_per_hour: 1.2     # per host vehicle, scaled by corridor rate_multiplier
  manual_share: 0.78             # of Poisson triggers, share labelled "manual"
  hard_brake_share: 0.22         # the rest go to "hard_brake"
  # Waypoint source = pre-planned drop-points the operator drives to.
  waypoint_trigger_prob: 0.10    # per waypoint visit, prob it's "interesting"

mission:
  # Spec 1.1 mission profile timings (seconds).
  decision_seconds: 2.0
  launch_seconds: 4.0
  climb_seconds: 25.0
  capture_seconds_min: 30.0
  capture_seconds_max: 120.0
  return_seconds: 25.0
  land_seconds: 8.0
  target_altitude_m: 80.0      # spec 1.2 50-120m AGL

probabilities:
  # Spec 9.1 — per-stage success probabilities.
  pre_flight_pass: 0.88
  launch_success: 0.97
  recovery_success: 0.98
  upload_success: 0.99

conditions:
  # Diurnal wind + weather model — feeds pre_flight_pass.
  wind_mph_base: 6.0
  wind_mph_amplitude: 8.0      # afternoon peak
  wind_abort_threshold_mph: 20 # spec §1.4
  weather_clear_prob: 0.85
  # Wind gusts (transient impulses on top of steady-state wind).
  gust_prob_per_second: 0.006
  gust_magnitude_mph_min: 8.0
  gust_magnitude_mph_max: 14.0
  gust_decay_per_second: 0.55

gps:
  # Spec §3.3 — host vehicle GPS uncertainty. Drone reads this position
  # to navigate; BLE precision landing bypasses it below 10m AGL.
  host_position_sigma_m: 1.25     # ~2.5m 2σ
  resample_interval_s: 2.5

pipeline:
  # Spec 9.2 — cloud processing latency + quality.
  process_minutes_min: 20.0
  process_minutes_max: 90.0
  quality_mean: 82.0           # spec 6.1 target avg >80
  quality_std: 10.0
  quality_threshold: 70.0      # below this, scenario is not delivered

economics:
  # Per-scenario price is derived by default via the cost-to-replicate model
  # in skydock.pricing (see replication_cost block below). Set pricing_mode
  # to "flat" to use price_per_scenario_usd directly (useful for sensitivity
  # sweeps where you want to fix the price).
  pricing_mode: derived
  price_per_scenario_usd: 150.0    # used only when pricing_mode = flat
  operator_cost_per_hour_usd: 30.0
  vehicle_cost_per_hour_usd: 5.0
  cloud_cost_per_scenario_usd: 0.80
  drone_wear_per_scenario_usd: 1.00
  fixed_daily_overhead_usd: 220.0

replication_cost:
  # Bottoms-up inputs the derived price is built from. Every field has an
  # external reference (see skydock/pricing.py docstring for sources).
  operator_loaded_hourly_usd: 100.0     # AV-eng total comp (BLS / Glassdoor)
  scenarios_per_operator_hour: 2.0       # spec §1.5: 12-20 captures / 8h shift
  annotation_labor_usd_per_scenario_low: 30.0    # Scale AI public filings (lower)
  annotation_labor_usd_per_scenario_high: 150.0  # Scale AI public filings (upper)
  drone_capex_amortized_usd_per_scenario: 1.50   # DJI Mini 4 Pro $760 / 500 missions
  vehicle_capex_amortized_usd_per_scenario: 2.00
  dock_capex_amortized_usd_per_scenario: 2.50
  cloud_processing_usd_per_scenario: 0.80
  bev_tooling_amortized_usd_per_scenario: 3.00
  delivery_tooling_amortized_usd_per_scenario: 1.00
  markup_low: 1.5         # tight commodity vendor margin
  markup_high: 3.0        # premium edge-case curation margin

failure_cascades:
  # Rare but consequential failures (spec §7.1) that take a unit offline.
  enabled: true
  drone_flyaway_prob_per_mission: 0.002      # ~1 in 500 missions
  drone_replacement_hours: 12.0              # downtime to procure + swap backup drone
  dock_damage_prob_per_landing: 0.015        # ~1.5% per landing
  dock_repair_hours: 6.0
  battery_degradation_per_flight_pct: 0.04   # capacity loss per flight cycle

customer_funnel:
  # Spec §4.1-4.3 customer-acquisition layer. Disabled by default — when
  # off, every delivered scenario sells at economics.price_per_scenario_usd
  # (current behaviour). When on, revenue depends on pilot commitments.
  enabled: false
  prospect_arrival_per_month: 2.0
  prospect_lifetime_days: 60.0
  prospect_quality_min: 78.0
  prospect_quality_max: 88.0
  daily_conversion_prob: 0.05
  scenarios_per_pilot_min: 100
  scenarios_per_pilot_max: 600
  starting_cash_usd: 700000.0        # spec §5.5 MVP budget upper bound
  fixed_monthly_burn_usd: 40000.0    # spec §5.4 Phase-3 burn

animation:
  fps: 15
  speed_multiplier: 90.0       # 1 real second = 90 sim seconds (1 sim day in ~5 min)
  trail_length_s: 60.0

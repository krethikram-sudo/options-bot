# Cloudflare Pages config for the ModelPilot landing page.
# A Pages project serves at <project>.pages.dev (no account-name subdomain),
# unlike Workers (*.<account>.workers.dev). This repo (options-bot) is
# multi-purpose; Cloudflare only serves the static ModelPilot site below.
name = "modelpilot"
pages_build_output_dir = "./modelpilot/site"

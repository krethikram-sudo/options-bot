name: publish-beta

# Auto-publish the customer beta repo whenever modelpilot changes land on main.
# No-ops until two things exist in this repo's Settings:
#   - repository VARIABLE  BETA_REPO          e.g. krethikram-sudo/modelpilot
#   - repository SECRET    BETA_PUBLISH_TOKEN fine-grained PAT with contents:write
#                                             on the beta repo
on:
  push:
    branches: [main]
    paths:
      - "modelpilot/**"
      - "scripts/publish_modelpilot.sh"
      - "scripts/install_modelpilot_gateway.sh"
      - "launchd/com.modelpilot.gateway.plist.template"
      - ".github/workflows/publish-beta.yml"
  workflow_dispatch:  # also: push to main touching the paths above auto-publishes

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ vars.BETA_REPO != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r modelpilot/requirements.txt

      # Clone the beta repo's history, empty the worktree (keep .git), then let
      # the publish script re-assemble from the allowlist — deletions propagate
      # and history is preserved, so customers' clones pull cleanly.
      - name: Sync beta repo
        env:
          TOKEN: ${{ secrets.BETA_PUBLISH_TOKEN }}
          BETA_REPO: ${{ vars.BETA_REPO }}
        run: |
          # Strip any whitespace/newline the PAT may have picked up when it was
          # pasted into the secret — a stray newline is what produced curl's
          # "Malformed input to a URL function". A clean PAT (only [A-Za-z0-9_])
          # is URL-safe, so embedding it as userinfo authenticates clone + push.
          CLEAN_TOKEN="$(printf '%s' "$TOKEN" | tr -d '[:space:]')"
          REMOTE="https://x-access-token:${CLEAN_TOKEN}@github.com/${BETA_REPO}.git"

          # The beta repo may be empty (just created, no commits). Clone if it has
          # history; otherwise init a fresh worktree pointed at the remote.
          if git clone --depth 1 "$REMOTE" /tmp/beta 2>/dev/null && [ -d /tmp/beta/.git ]; then
            find /tmp/beta -mindepth 1 -maxdepth 1 -not -name .git -exec rm -rf {} +
          else
            rm -rf /tmp/beta
            git init -b main /tmp/beta
            git -C /tmp/beta remote add origin "$REMOTE"
          fi

          ./scripts/publish_modelpilot.sh /tmp/beta
          git -C /tmp/beta push origin HEAD:main
